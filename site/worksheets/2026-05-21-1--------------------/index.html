<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>1年级口算天天练 - Claw AI数学老师</title>
  <!-- KaTeX 数学公式渲染 -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.css">
  <script src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, -apple-system, sans-serif; max-width: 1000px; margin: 0 auto; padding: 10px; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; }
    
    /* 移动端响应式适配 - 全面优化 */
    @media (max-width: 768px) {
      body { padding: 8px; }
      .card { padding: 15px; margin: 10px 0; border-radius: 12px; }
      .card h2 { font-size: 1.1rem; margin-bottom: 15px; }
      .question-item { padding: 12px; margin-bottom: 10px; }
      .question-text { font-size: 15px; }
      .question-answer input { width: 120px; font-size: 16px; padding: 8px; }
      .controls { padding: 10px; gap: 8px; }
      .btn { padding: 10px 16px; font-size: 14px; }
      .header h1 { font-size: 1.5rem; }
      .info-bar { flex-direction: column; gap: 5px; text-align: center; font-size: 13px; }
      .score-number { font-size: 3rem; }
      
      /* 手机端图形改成垂直布局，避免错位 */
      .question-graphic-container {
        flex-direction: column !important;
      }
      .question-graphic-container svg {
        max-width: 100% !important;
        height: auto !important;
        max-height: 150px !important;
      }
    }
    
    @media (max-width: 480px) {
      .question-answer input { width: 100px; }
      .btn { padding: 8px 12px; font-size: 13px; }
      .controls {
        display: grid;
        grid-template-columns: 1fr 1fr;
      }
      /* 更小屏幕图形优化 */
      .question-graphic-container > div:last-child {
        align-self: center;
      }
    }
    
    @media print {
      body { background: white; padding: 10px; }
      .no-print { display: none !important; }
      .card { box-shadow: none; border: 1px solid #ddd; page-break-inside: avoid; }
      input, textarea { border: none; border-bottom: 1px solid #333; background: transparent; }
    }

    .header { text-align: center; color: white; padding: 20px 0; }
    .header h1 { font-size: 2rem; margin-bottom: 10px; }
    .header p { opacity: 0.9; }

    .controls { background: white; padding: 15px; border-radius: 12px; margin-bottom: 20px; display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; }
    .btn { padding: 12px 24px; border: none; border-radius: 8px; font-size: 16px; cursor: pointer; font-weight: 600; transition: all 0.3s; }
    .btn-print { background: #4CAF50; color: white; }
    .btn-check { background: #1976D2; color: white; }
    .btn-reset { background: #ff9800; color: white; }
    .btn-hint { background: #9C27B0; color: white; }

    .card { background: white; padding: 25px; margin: 20px 0; border-radius: 16px; box-shadow: 0 10px 40px rgba(0,0,0,0.15); }
    .card h2 { color: #1976D2; margin-bottom: 20px; font-size: 1.4rem; border-bottom: 3px solid #e3f2fd; padding-bottom: 10px; }

    .question-grid { display: grid; grid-template-columns: 1fr; gap: 20px; }
    .question-item { padding: 20px; background: #f8f9fa; border-radius: 12px; border-left: 4px solid #1976D2; margin-bottom: 15px; transition: all 0.3s; }
    .question-item.correct { background: #e8f5e9; border-left-color: #4CAF50; }
    .question-item.wrong { background: #ffebee; border-left-color: #f44336; }
    .question-text { font-size: 17px; font-weight: 500; color: #333; margin-bottom: 15px; line-height: 1.6; }
    .question-answer textarea { width: 100%; padding: 12px; font-size: 16px; border: 2px solid #ddd; border-radius: 8px; min-height: 80px; resize: vertical; font-family: inherit; }
    .question-answer input { width: 150px; padding: 10px; font-size: 18px; border: 2px solid #ddd; border-radius: 6px; text-align: center; }
    .answer-row { display: flex; align-items: center; gap: 15px; }
    .answer-label { font-weight: 600; color: #666; }
    .result-icon { font-size: 24px; }
    .correct-answer { font-size: 15px; color: #4CAF50; font-weight: 600; margin-top: 10px; }

    .score-card { text-align: center; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; padding: 30px; border-radius: 16px; margin: 20px 0; display: none; }
    .score-card.show { display: block; }
    .score-number { font-size: 4rem; font-weight: bold; }

    .info-bar { background: #fff3cd; padding: 15px; border-radius: 10px; margin-bottom: 20px; display: flex; justify-content: space-between; align-items: center; }
    .info-bar span { color: #856404; font-weight: 600; }
    
    /* KaTeX 公式样式 */
    .katex { font-size: 1.1em; }
    .math-formula { font-family: 'Times New Roman', serif; }
  </style>
</head>
<body>
  <div class="header no-print">
    <h1>🧮 Claw AI数学老师</h1>
    <p>1年级口算天天练 · 共 5 道题</p>
  </div>

  <div class="controls no-print">
    <button class="btn btn-print" onclick="smartPrint()">🖨️ 打印练习</button>
    <button class="btn btn-check" onclick="checkAll()">✅ 自动批改</button>
    <button class="btn btn-reset" onclick="resetAll()">🔄 重置答案</button>
    <button class="btn btn-hint" onclick="showHints()">💡 显示提示</button>
  </div>

  <div class="info-bar no-print">
    <span>📅 生成时间：2026/5/21</span>
    <span>👤 1年级 · 口算天天练</span>
  </div>

  <div class="card">
    <h2>📝 练习题</h2>
    <div class="question-grid">
      
    <div class="question-item" id="q-1" data-answer="15">
      <div class="question-text"><strong>1.</strong> 13 + 2 =</div>
      <div class="question-answer" style="margin-top: 10px;">
        <input type="text" id="input-1" placeholder="答案">
        <span class="result-icon" id="icon-1"></span>
      </div>
      <div class="correct-answer" id="correct-1" style="display:none;">
        正确答案：15
      </div>
    </div>
    
    <div class="question-item" id="q-2" data-answer="14">
      <div class="question-text"><strong>2.</strong> 24 - 10 =</div>
      <div class="question-answer" style="margin-top: 10px;">
        <input type="text" id="input-2" placeholder="答案">
        <span class="result-icon" id="icon-2"></span>
      </div>
      <div class="correct-answer" id="correct-2" style="display:none;">
        正确答案：14
      </div>
    </div>
    
    <div class="question-item" id="q-3" data-answer="13">
      <div class="question-text"><strong>3.</strong> 22 - 9 =</div>
      <div class="question-answer" style="margin-top: 10px;">
        <input type="text" id="input-3" placeholder="答案">
        <span class="result-icon" id="icon-3"></span>
      </div>
      <div class="correct-answer" id="correct-3" style="display:none;">
        正确答案：13
      </div>
    </div>
    
    <div class="question-item" id="q-4" data-answer="28">
      <div class="question-text"><strong>4.</strong> 29 - 1 =</div>
      <div class="question-answer" style="margin-top: 10px;">
        <input type="text" id="input-4" placeholder="答案">
        <span class="result-icon" id="icon-4"></span>
      </div>
      <div class="correct-answer" id="correct-4" style="display:none;">
        正确答案：28
      </div>
    </div>
    
    <div class="question-item" id="q-5" data-answer="19">
      <div class="question-text"><strong>5.</strong> 28 - 9 =</div>
      <div class="question-answer" style="margin-top: 10px;">
        <input type="text" id="input-5" placeholder="答案">
        <span class="result-icon" id="icon-5"></span>
      </div>
      <div class="correct-answer" id="correct-5" style="display:none;">
        正确答案：19
      </div>
    </div>
    
    </div>
  </div>

  <div class="score-card no-print" id="scoreCard">
    <div class="score-number" id="scoreNumber">0</div>
    <div class="score-text">得分 · 共 5 题</div>
    <div style="margin-top: 15px; font-size: 18px;" id="scoreMessage"></div>
  </div>

  <script>
    const totalQuestions = 5;

    // 检查单道题
    function checkSingle(qid, answer) {
      const input = document.getElementById('input-' + qid);
      const item = document.getElementById('q-' + qid);
      const icon = document.getElementById('icon-' + qid);
      const correctAns = document.getElementById('correct-' + qid);
      const userAns = input.value.trim();
      
      if (userAns === '') {
        item.className = 'question-item';
        icon.textContent = '';
        correctAns.style.display = 'none';
        return 0;
      }
      
      const correctAnswer = answer;
      const userNum = parseFloat(userAns);
      
      if (!isNaN(userNum) && Math.abs(userNum - correctAnswer) < 0.1) {
        item.className = 'question-item correct';
        icon.textContent = '✅';
        correctAns.style.display = 'none';
        return 1;
      } else {
        item.className = 'question-item wrong';
        icon.textContent = '❌';
        correctAns.style.display = 'block';
        return 0;
      }
    }

    // 批改全部
    function checkAll() {
      let correct = 0;
      correct += checkSingle(1, 15);
      correct += checkSingle(2, 14);
      correct += checkSingle(3, 13);
      correct += checkSingle(4, 28);
      correct += checkSingle(5, 19);

      const scoreCard = document.getElementById('scoreCard');
      const scoreNumber = document.getElementById('scoreNumber');
      const scoreMessage = document.getElementById('scoreMessage');
      
      const percentage = Math.round((correct / totalQuestions) * 100);
      scoreNumber.textContent = percentage + '%';
      scoreCard.className = 'score-card no-print show';
      
      if (percentage >= 90) {
        scoreMessage.textContent = '🌟 太棒了！你是数学小天才！';
      } else if (percentage >= 70) {
        scoreMessage.textContent = '👍 不错！继续加油！';
      } else if (percentage >= 60) {
        scoreMessage.textContent = '💪 及格了，还要努力哦！';
      } else {
        scoreMessage.textContent = '📚 没关系，多练习就会进步的！';
      }
      
      scoreCard.scrollIntoView({ behavior: 'smooth', block: 'center' });
    }

    // 重置全部
    function resetAll() {
      const textareas = document.querySelectorAll('textarea');
      textareas.forEach(ta => ta.value = '');
      
      
    document.getElementById('input-1').value = '';
    document.getElementById('q-1').className = 'question-item';
    document.getElementById('icon-1').textContent = '';
    document.getElementById('correct-1').style.display = 'none';
    
    document.getElementById('input-2').value = '';
    document.getElementById('q-2').className = 'question-item';
    document.getElementById('icon-2').textContent = '';
    document.getElementById('correct-2').style.display = 'none';
    
    document.getElementById('input-3').value = '';
    document.getElementById('q-3').className = 'question-item';
    document.getElementById('icon-3').textContent = '';
    document.getElementById('correct-3').style.display = 'none';
    
    document.getElementById('input-4').value = '';
    document.getElementById('q-4').className = 'question-item';
    document.getElementById('icon-4').textContent = '';
    document.getElementById('correct-4').style.display = 'none';
    
    document.getElementById('input-5').value = '';
    document.getElementById('q-5').className = 'question-item';
    document.getElementById('icon-5').textContent = '';
    document.getElementById('correct-5').style.display = 'none';
    
      
      document.getElementById('scoreCard').className = 'score-card no-print';
    }
    
    // 显示提示
    function showHints() {
      const hints = document.querySelectorAll('.correct-answer');
      hints.forEach(h => h.style.display = h.style.display === 'none' ? 'block' : 'none');
    }
    
    // 智能打印 - 检测飞书/微信内置浏览器
    function smartPrint() {
      var ua = navigator.userAgent.toLowerCase();
      var isFeishu = ua.indexOf('feishu') > -1 || ua.indexOf('lark') > -1;
      var isWechat = ua.indexOf('micromessenger') > -1;
      
      if (isFeishu || isWechat) {
        var tip = document.createElement('div');
        tip.style.cssText = 'position:fixed;top:20%;left:50%;transform:translateX(-50%);background:white;padding:20px;border-radius:12px;box-shadow:0 10px 40px rgba(0,0,0,0.3);z-index:9999;max-width:90%;text-align:center;';
        var html = '';
        html += '<h3 style="color:#E65100;margin:0 0 15px 0;">📢 打印提示</h3>';
        html += '<p style="margin:10px 0;color:#333;font-size:15px;">检测到您在飞书/微信中打开</p>';
        html += '<p style="margin:10px 0;color:#666;font-size:14px;">内置浏览器不支持直接打印，请：</p>';
        html += '<ol style="text-align:left;color:#333;padding-left:20px;margin:15px 0;font-size:14px;">';
        html += '<li style="margin:8px 0;">点击右上角 <strong>「...」</strong> 按钮</li>';
        html += '<li style="margin:8px 0;">选择 <strong>「在浏览器打开」</strong></li>';
        html += '<li style="margin:8px 0;">在系统浏览器中点击打印按钮</li>';
        html += '</ol>';
        html += '<button onclick="this.parentElement.remove()" style="margin-top:15px;padding:10px 24px;background:#1976D2;color:white;border:none;border-radius:8px;font-size:16px;cursor:pointer;">知道了</button>';
        tip.innerHTML = html;
        document.body.appendChild(tip);
      } else {
        window.print();
      }
    }

    // 回车跳到下一题
    document.querySelectorAll('input').forEach((input, index, inputs) => {
      input.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') {
          if (index < inputs.length - 1) {
            inputs[index + 1].focus();
          } else {
            checkAll();
          }
        }
      });
    });
  </script>
</body>
</html>
